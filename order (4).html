<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Ideas SHOP - অর্ডার করুন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            padding-bottom: 90px;
        }

        /* --- Header --- */
        .header {
            background: linear-gradient(135deg, #3f51b5, #5c6bc0);
            color: white;
            display: flex;
            align-items: center;
            padding: 20px 15px;
            box-shadow: 0 4px 12px rgba(63, 81, 181, 0.2);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .header-title { font-size: 20px; font-weight: 600; margin-left: 10px; }

        /* --- Container --- */
        .order-container {
            padding: 20px 15px;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card h3 {
            margin-top: 0;
            color: #3f51b5;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        /* --- Cart Section --- */
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-left { display: flex; align-items: center; gap: 10px; }
        .item-details p { margin: 0; font-size: 14px; font-weight: 600; }
        .item-details span { font-size: 12px; color: #777; }
        .delete-btn { color: #ff4d4d; background: none; border: none; font-size: 16px; cursor: pointer; }
        
        .empty-cart { text-align: center; color: #999; font-size: 14px; padding: 10px 0; }

        /* --- Custom Checkbox --- */
        input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: #3f51b5; cursor: pointer;
        }

        /* --- Form Inputs --- */
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label {
            display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600;
        }
        .input-group select, .input-group input, .input-group textarea {
            width: 100%; padding: 12px 14px;
            border: 1px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; box-sizing: border-box; background-color: #f9f9f9;
        }
        .input-group select:focus, .input-group input:focus, .input-group textarea:focus {
            outline: none; border-color: #3f51b5; background-color: #fff;
        }
        
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }

        /* --- Order Summary --- */
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #555; }
        .summary-total { font-size: 16px; font-weight: 700; color: #333; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }

        /* --- WhatsApp Submit Button --- */
        .order-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; border: none; width: 100%; padding: 16px;
            font-size: 16px; font-weight: 700; border-radius: 12px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3); margin-top: 10px;
        }

        /* --- Bottom Navigation Bar --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: white; display: flex; justify-content: space-around;
            padding: 12px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); z-index: 100;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
 
        /* --- Premium Custom Preloader CSS --- */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loader-content {
            text-align: center;
        }

        /* লাইট জ্বলছে এবং নিভছে (Glowing Animation) */
        .idea-bulb {
            font-size: 70px;
            color: #dcdde1; /* নিভানো অবস্থার কালার (হালকা ধূসর) */
            animation: light-glow 1.5s infinite alternate ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes light-glow {
            0% {
                color: #dcdde1;
                text-shadow: none;
                transform: scale(1);
            }
            100% {
                color: #ffca28; /* জ্বলন্ত অবস্থার কালার (হলুদ) */
                text-shadow: 0 0 15px rgba(255, 202, 40, 0.6), 
                             0 0 30px rgba(255, 193, 7, 0.8), 
                             0 0 50px rgba(255, 179, 0, 1);
                transform: scale(1.05); /* জ্বললে একটু বড় হবে */
            }
        }

        /* নৌকার ঢেউয়ের মতো টেক্সট অ্যানিমেশন */
        .wavy-text {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .wavy-text span {
            position: relative;
            display: inline-block;
            font-size: 22px;
            font-weight: 800;
            color: #0b1e36; /* আপনার থিমের নেভি ব্লু কালার */
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: wave-anim 1.5s infinite ease-in-out;
            /* প্রতিটি অক্ষরে আলাদা আলাদা সময়ে অ্যানিমেশন শুরু হবে, তাই ঢেউয়ের মতো মনে হবে */
            animation-delay: calc(0.1s * var(--i)); 
        }

        @keyframes wave-anim {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px); /* পানির ঢেউয়ের মতো উপরে উঠবে */
                color: #ffca28; /* ঢেউয়ের সাথে সাথে লেখার কালারও একটু চেঞ্জ হবে */
            }
        }


        .nav-item { text-align: center; color: #9e9e9e; text-decoration: none; flex-grow: 1; transition: 0.3s; }
        .nav-item.active { color: #3f51b5; transform: translateY(-2px); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item p { margin: 0; font-size: 12px; font-weight: 600; }
    </style>
</head>

    <div id="page-loader" class="page-loader">
        <div class="loader-content">
            <i class="fas fa-lightbulb idea-bulb"></i>
            
            <div class="wavy-text">
                <span style="--i:1;">L</span>
                <span style="--i:2;">o</span>
                <span style="--i:3;">a</span>
                <span style="--i:4;">d</span>
                <span style="--i:5;">i</span>
                <span style="--i:6;">n</span>
                <span style="--i:7;">g</span>
                <span style="--i:8;">.</span>
                <span style="--i:9;">.</span>
                <span style="--i:10;">.</span>
            </div>
        </div>
    </div>


<body>

    <header class="header">
        <i class="fas fa-shopping-cart" style="font-size: 20px; margin-left: 10px;"></i>
        <div class="header-title">চেকআউট</div>
    </header>

    <div class="order-container">
        
        <div class="card">
            <h3><i class="fas fa-shopping-bag"></i> আপনার কার্ট</h3>
            <div id="cartItemsContainer">
                </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-map-marker-alt"></i> ডেলিভারি তথ্য</h3>
            
            <div class="input-group">
                <label>আপনার নাম</label>
                <input type="text" id="orderName" placeholder="নাম লিখুন">
            </div>

            <div class="input-group">
                <label>মোবাইল নম্বর</label>
                <input type="number" id="orderPhone" placeholder="01XXXXXXXXX">
            </div>

            <div class="row">
                <div class="col input-group">
                    <label>বিভাগ ও💡</label>
                    <select id="divisionSelect" onchange="loadDistricts()">
                        <option value="">নির্বাচন করুন</option>
                    </select>
                </div>
                <div class="col input-group">
                    <label>জেলা</label>
                    <select id="districtSelect">
                        <option value="">প্রথমে বিভাগ নির্বাচন করুন</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>বিস্তারিত ঠিকানা (ঐচ্ছিক)</label>
                <textarea id="orderAddress" rows="2" placeholder="গ্রাম/রাস্তা, এলাকা, থানা ।"></textarea>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-receipt"></i> পেমেন্ট সামারি</h3>
            <div class="summary-row">
                <span>প্রোডাক্টের দাম:</span>
                <span id="subTotal">০ ৳</span>
            </div>
            <div class="summary-row">
                <span>ডেলিভারি চার্জ:</span>
                <span id="deliveryCharge">০ ৳</span>
            </div>
            <div class="summary-row summary-total">
                <span>সর্বমোট:</span>
                <span id="grandTotal" style="color: #3f51b5;">০ ৳</span>
            </div>

            <button class="order-btn" onclick="sendOrderToWhatsApp()">
                <i class="fab fa-whatsapp" style="font-size: 24px;"></i> অর্ডার কনফার্ম করুন
            </button>
        </div>

    </div>

    <footer class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i> <p>হোম</p></a>
        <a href="category.html" class="nav-item"><i class="fas fa-th-large"></i> <p>ক্যাটাগরি</p></a>
        <a href="order.html" class="nav-item active"><i class="fas fa-shopping-bag"></i> <p>অর্ডার</p></a>
        <a href="store.html" class="nav-item"><i class="fas fa-store"></i><p>Store</p></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> <p>প্রোফাইল</p></a>
    </footer>

    <script>
        // বাংলাদেশের বিভাগ ও জেলা সমূহ
        const locations = {
            "💡কুষ্টিয়া সদর জেলা":["বটতল","চৌরহাঁস", "সাদ্দাম বাজার","কলেজ মোড়","জেলখানা মোড়","মজমপুর গেট"],
            "ঢাকা": ["ঢাকা", "গাজীপুর", "নারায়ণগঞ্জ", "টাঙ্গাইল", "কিশোরগঞ্জ", "মানিকগঞ্জ", "মুন্সীগঞ্জ", "রাজবাড়ী", "মাদারীপুর", "গোপালগঞ্জ", "ফরিদপুর", "শরীয়তপুর", "নরসিংদী"],
            "চট্টগ্রাম": ["চট্টগ্রাম", "কক্সবাজার", "রাঙ্গামাটি", "বান্দরবান", "খাগড়াছড়ি", "ফেনী", "নোয়াখালী", "লক্ষ্মীপুর", "কুমিল্লা", "চাঁদপুর", "ব্রাহ্মণবাড়িয়া"],
            "রাজশাহী": ["রাজশাহী", "নাটোর", "নওগাঁ", "চাঁপাইনবাবগঞ্জ", "পাবনা", "সিরাজগঞ্জ", "বগুড়া", "জয়পুরহাট"],
            "খুলনা": ["খুলনা", "বাগেরহাট", "সাতক্ষীরা", "যশোর", "মাগুরা", "ঝিনাইদহ", "নড়াইল", "কুষ্টিয়া", "চুয়াডাঙ্গা", "মেহেরপুর"],
            "বরিশাল": ["বরিশাল", "পটুয়াখালী", "ভোলা", "পিরোজপুর", "বরগুনা", "ঝালকাঠি"],
            "সিলেট": ["সিলেট", "মৌলভীবাজার", "হবিগঞ্জ", "সুনামগঞ্জ"],
            "রংপুর": ["রংপুর", "দিনাজপুর", "কুড়িগ্রাম", "গাইবান্ধা", "নীলফামারী", "পঞ্চগড়", "ঠাকুরগাঁও", "লালমনিরহাট"],
            "ময়মনসিংহ": ["ময়মনসিংহ", "জামালপুর", "শেরপুর", "নেত্রকোনা"]
        };

        // টেস্টিংয়ের জন্য কিছু ডেমো কার্ট ডাটা (প্রোডাকশনে এটি ক্যাটাগরি পেজ থেকে আসবে)
        // যদি লোকাল স্টোরেজে ডাটা না থাকে, তবে ডেমো ডাটা দেখাবে
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        
        // বিভাগ লোড করা
        function loadDivisions() {
            let divSelect = document.getElementById("divisionSelect");
            for (let div in locations) {
                divSelect.options.add(new Option(div, div));
            }
        }

        // জেলা লোড করা এবং ডেলিভারি চার্জ হিসাব করা
        function loadDistricts() {
            let divSelect = document.getElementById("divisionSelect").value;
            let distSelect = document.getElementById("districtSelect");
            distSelect.innerHTML = '<option value="">নির্বাচন করুন</option>';
            
            if (divSelect !== "") {
                locations[divSelect].forEach(dist => {
                    distSelect.options.add(new Option(dist, dist));
                });
            }
            calculateTotal(); // বিভাগ চেঞ্জ হলে ডেলিভারি চার্জ আপডেট হবে
        }

        // কার্ট রেন্ডার করা (স্ক্রিনে দেখানো)
        function renderCart() {
            let container = document.getElementById("cartItemsContainer");
            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">আপনার কার্টে কোনো প্রোডাক্ট নেই!</div>';
                calculateTotal();
                return;
            }

            cart.forEach((item, index) => {
                let html = `
                    <div class="cart-item">
                        <div class="cart-item-left">
                            <input type="checkbox" class="item-check" onchange="calculateTotal()" checked data-index="${index}">
                            <div class="item-details">
                                <p>${item.name}</p>
                                <span>${item.price} ৳ (Qty: ${item.qty})</span>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${index})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                container.innerHTML += html;
            });
            calculateTotal();
        }

        // প্রোডাক্ট ডিলিট করা
        function deleteItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('myCart', JSON.stringify(cart));
            renderCart();
        }

        // টোটাল প্রাইস হিসাব করা
        function calculateTotal() {
            let checkboxes = document.querySelectorAll('.item-check');
            let subTotal = 0;
            let selectedItemsCount = 0;

            checkboxes.forEach(box => {
                if (box.checked) {
                    let index = box.getAttribute('data-index');
                    subTotal += (cart[index].price * cart[index].qty);
                    selectedItemsCount++;
                }
            });

            // ডেলিভারি চার্জ লজিক (ঢাকা হলে ৮০, বাইরে হলে ১২০)
            let division = document.getElementById("divisionSelect").value;
            let deliveryCharge = 0;
            
            if(selectedItemsCount > 0) {
                if (division === "💡কুষ্টিয়া সদর জেলা") deliveryCharge = 20;
                else if (division !== "") deliveryCharge = 110;
                else deliveryCharge = 0; // বিভাগ সিলেক্ট না করলে
            }

            let grandTotal = subTotal + deliveryCharge;

            document.getElementById("subTotal").innerText = subTotal + " ৳";
            document.getElementById("deliveryCharge").innerText = deliveryCharge + " ৳";
            document.getElementById("grandTotal").innerText = grandTotal + " ৳";
        }

        // পেজ লোড হওয়ার পর ইনিশিয়াল সেটআপ
        window.onload = function() {
            loadDivisions();
            renderCart();

            let savedName = localStorage.getItem('userProfileName');
            let savedPhone = localStorage.getItem('userProfilePhone');
            if (savedName) document.getElementById('orderName').value = savedName;
            if (savedPhone) document.getElementById('orderPhone').value = savedPhone.replace(/[^\d]/g, '');
        };

        // হোয়াটসঅ্যাপে ডেটা পাঠানো
        function sendOrderToWhatsApp() {
            let name = document.getElementById('orderName').value.trim();
            let phone = document.getElementById('orderPhone').value.trim();
            let division = document.getElementById('divisionSelect').value;
            let district = document.getElementById('districtSelect').value;
            let address = document.getElementById('orderAddress').value.trim();

            let checkboxes = document.querySelectorAll('.item-check');
            let selectedItems = [];
            
            checkboxes.forEach(box => {
                if (box.checked) {
                    let index = box.getAttribute('data-index');
                    selectedItems.push(cart[index]);
                }
            });

            if (selectedItems.length === 0) {
                alert("অর্ডার করার জন্য অন্তত একটি প্রোডাক্ট সিলেক্ট করুন!");
                return;
            }
            if (name === "" || phone === "" || division === "" || district === "") {
                alert("অনুগ্রহ করে আপনার নাম, নম্বর, বিভাগ এবং জেলা নির্বাচন করুন!");
                return;
            }

            let fullAddress = district + ", " + division;
            if(address !== "") fullAddress = address + ", " + fullAddress;

            let subTotalText = document.getElementById("subTotal").innerText;
            let deliveryText = document.getElementById("deliveryCharge").innerText;
            let grandTotalText = document.getElementById("grandTotal").innerText;

            let message = "*নতুন অর্ডার এসেছে! (Ideas SHOP)*\n";
            message += "-----------------------------------\n";
            message += "👤 *নাম:* " + name + "\n";
            message += "📳 *মোবাইল:* " + phone + "\n";
            message += "📍 *ঠিকানা:* " + fullAddress + "\n";
            message += "-----------------------------------\n";
            message += "🛍️ *অর্ডারের বিবরণ:*\n";
            
            selectedItems.forEach((item, i) => {
                message += `${i+1}. ${item.name} - ${item.price}৳ (Qty: ${item.qty})\n`;
            });

            message += "-----------------------------------\n";
            message += "🛒 *সাবটোটাল:* " + subTotalText + "\n";
            message += "🚚 *ডেলিভারি চার্জ:* " + deliveryText + "\n";
            message += "💰 *সর্বমোট বিল:* *" + grandTotalText + "*\n";

            let adminWhatsAppNumber = "8801936617023"; 
            let whatsappURL = "https://wa.me/" + adminWhatsAppNumber + "?text=" + encodeURIComponent(message);
            
            window.location.href = whatsappURL;
        }
  
        // লোডার হাইড করার মেইন ফাংশন
        function hideLoader() {
            const loader = document.getElementById('page-loader');
            if(loader) {
                loader.style.opacity = '0'; // আগে আস্তে করে অদৃশ্য হবে
                setTimeout(() => {
                    loader.style.display = 'none'; // তারপর জায়গা ছেড়ে দেবে
                }, 400);
            }
        }

        // ১. পেজ পুরোপুরি লোড হয়ে গেলে লোডার সরিয়ে ফেলবে
        window.addEventListener('load', function() {
            hideLoader();
        });

        // ২. ফেইলসেফ: কোনো কারণে পেজ আটকে গেলে ৩ সেকেন্ড পর অটোমেটিক লোডার বন্ধ হয়ে যাবে
        setTimeout(function() {
            hideLoader();
        }, 3000);

        // ৩. নিচের মেনুতে (Home, Store ইত্যাদিতে) ক্লিক করলে আবার লোডার দেখাবে
        document.querySelectorAll('.bottom-nav a').forEach(link => {
            link.addEventListener('click', function() {
                const loader = document.getElementById('page-loader');
                if(loader) {
                    loader.style.display = 'flex';
                    loader.style.opacity = '1';
                }
            });
        });
     
    </script>
</body>
</html>
