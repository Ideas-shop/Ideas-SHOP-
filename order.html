<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas SHOP - অর্ডার করুন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7fa;
            color: #333;
            padding-bottom: 80px; /* Bottom nav space */
        }

        /* --- Header --- */
        .header {
            background-color: #3f51b5;
            color: white;
            display: flex;
            align-items: center;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-title { font-size: 18px; font-weight: bold; margin-left: 15px; }

        /* --- Order Form Section --- */
        .order-container {
            padding: 20px;
        }

        .order-card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .order-card h3 {
            margin-top: 0;
            color: #3f51b5;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fdfdfd;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3f51b5;
            background-color: #fff;
        }

        /* --- Submit Button --- */
        .order-btn {
            background-color: #4caf50; /* WhatsApp Green color */
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.3);
            margin-top: 10px;
        }

        .order-btn:active {
            transform: scale(0.98);
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: white; display: flex; justify-content: space-around;
            padding: 10px 0; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); z-index: 100;
        }
        .nav-item { text-align: center; color: #888; text-decoration: none; flex-grow: 1; }
        .nav-item.active { color: #3f51b5; }
        .nav-item i { font-size: 20px; }
        .nav-item p { margin: 3px 0 0; font-size: 12px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title"><i class="fas fa-shopping-cart"></i> অর্ডার ফর্ম</div>
    </header>

    <div class="order-container">
        <div class="order-card">
            <h3>আপনার ডেলিভারি তথ্য দিন</h3>
            
            <div class="input-group">
                <label>আপনার নাম</label>
                <input type="text" id="orderName" placeholder="নাম লিখুন">
            </div>

            <div class="input-group">
                <label>মোবাইল নম্বর</label>
                <input type="number" id="orderPhone" placeholder="01XXXXXXXXX">
            </div>

            <div class="input-group">
                <label>পূর্ণাঙ্গ ডেলিভারি ঠিকানা</label>
                <textarea id="orderAddress" rows="3" placeholder="গ্রাম/রাস্তা, এলাকা, থানা, জেলা"></textarea>
            </div>

            <div class="input-group">
                <label>কী অর্ডার করতে চান? (পণ্যের নাম/কোড)</label>
                <textarea id="orderDetails" rows="2" placeholder="যেমন: ২টি কালো টি-শার্ট (সাইজ L)"></textarea>
            </div>

            <button class="order-btn" onclick="sendOrderToWhatsApp()">
                <i class="fab fa-whatsapp" style="font-size: 22px;"></i> অর্ডার কনফার্ম করুন
            </button>
        </div>
    </div>

    <footer class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i> <p>হোম</p></a>
        <a href="category.html" class="nav-item"><i class="fas fa-th-large"></i> <p>ক্যাটেগরি</p></a>
        <a href="order.html" class="nav-item active"><i class="fas fa-shopping-bag"></i> <p>অর্ডার</p></a>
        <a href="profile .html" class="nav-item"><i class="fas fa-user"></i> <p>প্রোফাইল</p></a>
    </footer>

    <script>
        // পেজ লোড হওয়ার সাথে সাথে প্রোফাইলের ডাটা ফর্মে অটো-ফিল হয়ে যাবে
        window.onload = function() {
    // প্রোফাইলের ডাটা টানা
    let savedName = localStorage.getItem('profileName');
    let savedPhone = localStorage.getItem('profilePhone');
    
    // ক্যাটাগরি পেজ থেকে আসা প্রোডাক্টের ডাটা টানা
    let autoProduct = localStorage.getItem('selectedItem');

    if (savedName) {
        document.getElementById('orderName').value = savedName;
    }
    if (savedPhone) {
        document.getElementById('orderPhone').value = savedPhone.replace(/[^\d]/g, '');
    }
    
    // যদি কোনো প্রোডাক্ট সিলেক্ট করে আসে, তবে সেটি বক্সে বসিয়ে দেওয়া
    if (autoProduct) {
        document.getElementById('orderDetails').value = autoProduct;
        
        // একবার বক্সে বসানোর পর মেমোরি থেকে মুছে ফেলা ভালো, যাতে কাস্টমার চাইলে পরে বক্সে অন্য কিছু লিখতে পারে
        localStorage.removeItem('selectedItem');
    }
};


        // হোয়াটসঅ্যাপে অর্ডার পাঠানোর ফাংশন
        function sendOrderToWhatsApp() {
            let name = document.getElementById('orderName').value;
            let phone = document.getElementById('orderPhone').value;
            let address = document.getElementById('orderAddress').value;
            let details = document.getElementById('orderDetails').value;

            // ফর্মের কোনো ঘর খালি আছে কি না চেক করা
            if (name === "" || phone === "" || address === "" || details === "") {
                alert("অনুগ্রহ করে সব তথ্য সঠিকভাবে পূরণ করুন!");
                return;
            }

            // আপনার হোয়াটসঅ্যাপ নম্বর (এখানে আপনার নিজের নম্বরটি দেবেন +88 সহ)
            let adminWhatsAppNumber = "8801936617023"; // <--- এই নম্বরটি পরিবর্তন করুন

            // হোয়াটসঅ্যাপের মেসেজ সুন্দরভাবে সাজানো
            let message = "*নতুন অর্ডার এসেছে! (Ideas SHOP)*\n\n";
            message += "👤 *কাস্টমারের নাম:* " + name + "\n";
            message += "📳 *মোবাইল নম্বর:* " + phone + "\n";
            message += "📍 *ডেলিভারি ঠিকানা:* " + address + "\n";
            message += "🛍️ *অর্ডারের বিবরণ:* " + details;

            // টেক্সটকে ওয়েব লিংকে কনভার্ট করে হোয়াটসঅ্যাপ ওপেন করা
            let whatsappURL = "https://wa.me/" + adminWhatsAppNumber + "?text=" + encodeURIComponent(message);
            
            window.location.href = whatsappURL;
        }
    </script>
</body>
</html>
