<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Ideas SHOP - অর্ডার করুন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5; /* প্রোফাইলের সাথে মিল রেখে মডার্ন ব্যাকগ্রাউন্ড */
            color: #333;
            padding-bottom: 90px;
        }

        /* --- Header --- */
        .header {
            background: linear-gradient(135deg, #3f51b5, #5c6bc0);
            color: white;
            display: flex;
            align-items: center;
            padding: 20px 15px;
            box-shadow: 0 4px 12px rgba(63, 81, 181, 0.2);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .header-title { font-size: 20px; font-weight: 600; margin-left: 10px; }

        /* --- Order Form Section --- */
        .order-container {
            padding: 20px 15px;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-card {
            background-color: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .order-card h3 {
            margin-top: 0;
            color: #333;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #777;
            margin-bottom: 8px;
            font-weight: 600;
            margin-left: 5px;
        }

        /* আইকনের স্টাইল */
        .input-icon {
            position: absolute;
            left: 15px;
            top: 40px;
            color: #3f51b5;
            font-size: 16px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px 14px 14px 45px; /* বাম দিকে আইকনের জন্য জায়গা রাখা হয়েছে */
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #f9f9f9;
            transition: all 0.3s;
        }

        .input-group textarea {
            padding-left: 15px; /* টেক্সটএরিয়াতে আইকন নেই, তাই প্যাডিং স্বাভাবিক */
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3f51b5;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.1);
        }

        /* --- WhatsApp Submit Button --- */
        .order-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3);
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .order-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(37, 211, 102, 0.3);
        }

        /* --- Bottom Navigation Bar --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: white; display: flex; justify-content: space-around;
            padding: 12px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); z-index: 100;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
        .nav-item { text-align: center; color: #9e9e9e; text-decoration: none; flex-grow: 1; transition: 0.3s; }
        .nav-item.active { color: #3f51b5; transform: translateY(-2px); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item p { margin: 0; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <header class="header">
        <i class="fas fa-shopping-cart" style="font-size: 20px; margin-left: 10px;"></i>
        <div class="header-title">চেকআউট</div>
    </header>

    <div class="order-container">
        <div class="order-card">
            <h3><i class="fas fa-box-open" style="color: #3f51b5; margin-right: 8px;"></i> আপনার ডেলিভারি তথ্য</h3>
            
            <div class="input-group">
                <label>আপনার নাম</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="orderName" placeholder="নাম লিখুন">
            </div>

            <div class="input-group">
                <label>মোবাইল নম্বর</label>
                <i class="fas fa-phone-alt input-icon"></i>
                <input type="number" id="orderPhone" placeholder="01XXXXXXXXX">
            </div>

            <div class="input-group">
                <label>পূর্ণাঙ্গ ডেলিভারি ঠিকানা</label>
                <textarea id="orderAddress" rows="3" placeholder="গ্রাম/রাস্তা, এলাকা, থানা, জেলা"></textarea>
            </div>

            <div class="input-group">
                <label>কী অর্ডার করতে চান? (পণ্যের নাম/কোড)</label>
                <textarea id="orderDetails" rows="3" placeholder="যেমন: ২টি কালো টি-শার্ট (সাইজ L)"></textarea>
            </div>

            <button class="order-btn" onclick="sendOrderToWhatsApp()">
                <i class="fab fa-whatsapp" style="font-size: 24px;"></i> হোয়াটসঅ্যাপে অর্ডার কনফার্ম করুন
            </button>
        </div>
    </div>

    <footer class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i> <p>হোম</p></a>
        <a href="category.html" class="nav-item"><i class="fas fa-th-large"></i> <p>ক্যাটাগরি</p></a>
        <a href="order.html" class="nav-item active"><i class="fas fa-shopping-bag"></i> <p>অর্ডার</p></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> <p>প্রোফাইল</p></a>
    </footer>

    <script>
        // পেজ লোড হওয়ার সাথে সাথে প্রোফাইলের ডাটা ফর্মে অটো-ফিল হয়ে যাবে
        window.onload = function() {
            // প্রোফাইল পেজের নতুন সেভ করা ডাটা টানা
            let savedName = localStorage.getItem('userProfileName') || localStorage.getItem('profileName');
            let savedPhone = localStorage.getItem('userProfilePhone') || localStorage.getItem('profilePhone');
            
            // ক্যাটাগরি পেজ থেকে আসা প্রোডাক্টের ডাটা টানা
            let autoProduct = localStorage.getItem('selectedItem');

            if (savedName) {
                document.getElementById('orderName').value = savedName;
            }
            if (savedPhone) {
                document.getElementById('orderPhone').value = savedPhone.replace(/[^\d]/g, '');
            }
            
            if (autoProduct) {
                document.getElementById('orderDetails').value = autoProduct;
                localStorage.removeItem('selectedItem');
            }
        };

        // হোয়াটসঅ্যাপে অর্ডার পাঠানোর ফাংশন
        function sendOrderToWhatsApp() {
            let name = document.getElementById('orderName').value.trim();
            let phone = document.getElementById('orderPhone').value.trim();
            let address = document.getElementById('orderAddress').value.trim();
            let details = document.getElementById('orderDetails').value.trim();

            if (name === "" || phone === "" || address === "" || details === "") {
                alert("অনুগ্রহ করে আপনার নাম, নম্বর এবং ঠিকানা সঠিকভাবে পূরণ করুন!");
                return;
            }

            // আপনার হোয়াটসঅ্যাপ নম্বর
            let adminWhatsAppNumber = "8801936617023"; 

            let message = "*নতুন অর্ডার এসেছে! (Ideas SHOP)*\n";
            message += "-----------------------------------\n";
            message += "👤 *নাম:* " + name + "\n";
            message += "📳 *মোবাইল:* " + phone + "\n";
            message += "📍 *ঠিকানা:* " + address + "\n";
            message += "-----------------------------------\n";
            message += "🛍️ *অর্ডারের বিবরণ:*\n" + details;

            // ওয়েব লিংকে কনভার্ট করে হোয়াটসঅ্যাপ ওপেন করা
            let whatsappURL = "https://wa.me/" + adminWhatsAppNumber + "?text=" + encodeURIComponent(message);
            
            window.location.href = whatsappURL;
        }
    </script>
</body>
</html>
