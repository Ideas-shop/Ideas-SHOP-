<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas SHOP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        .logo-box img {
            width: 80%;
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 24px;
            color: #e5981a; /* লোগোর রঙের সাথে মিল রেখে */
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .main-btn {
            background-color: #e5981a;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 152, 26, 0.3);
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .main-btn:hover {
            background-color: #cb8410;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- লোগো সেকশন -->
        <div class="logo-box">
            <img src="Logo1.png" alt="Ideas SHOP Logo">
        </div>

        <!-- টেক্সট সেকশন -->
        <h1>Welcome to Ideas SHOP</h1>
        <p>Make Life Meaningful</p>

        <!-- অ্যাকশন বাটন -->
        <a href="home.html" class="main-btn">Let's Start</a>
    </div>

</body>
</html>
