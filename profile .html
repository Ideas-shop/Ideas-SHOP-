<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas SHOP - প্রোফাইল</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7fa;
            color: #333;
        }

        /* --- Header --- */
        .header {
            background-color: #3f51b5;
            color: white;
            display: flex;
            align-items: center;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 15px; }
        .header-title { font-size: 18px; font-weight: bold; }

        /* --- Profile Card --- */
        .profile-card {
            background-color: #3f51b5; color: white; text-align: center;
            padding: 30px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .profile-img-container { position: relative; display: inline-block; }
        .profile-card img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid white; object-fit: cover;
        }
        #imageInput { display: none; }
        .edit-pic-btn {
            position: absolute; bottom: 5px; right: 5px;
            background-color: #ff5722; color: white; border: none;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .user-name { font-size: 22px; font-weight: bold; margin: 10px 0 5px 0; }
        .user-phone { font-size: 14px; opacity: 0.9; margin: 0; }

        /* --- Modals --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);
            z-index: 200; justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: white; padding: 20px; border-radius: 15px;
            width: 85%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-top: 0; color: #3f51b5; text-align: center; }
        .modal-content input {
            width: 90%; padding: 10px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 8px; font-size: 16px;
        }
        
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 15px; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 48%; }
        .btn-save { background-color: #3f51b5; color: white; }
        .btn-cancel { background-color: #eee; color: #333; }

        /* --- Digital ID Card Style (নতুন ডিজাইন) --- */
        .id-card {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            border: 1px solid #ddd; border-radius: 12px;
            padding: 20px; text-align: center; margin-top: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .id-card img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #3f51b5; object-fit: cover; margin-bottom: 10px; }
        .id-card h4 { margin: 5px 0; color: #333; font-size: 18px; }
        .id-card p { margin: 5px 0; color: #666; font-size: 14px; }
        .id-card .badge {
            display: inline-block; background-color: #4caf50; color: white;
            padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-top: 10px;
        }

        /* --- Menu List --- */
        .menu-container { padding: 20px 15px; padding-bottom: 90px; }
        .menu-group {
            background-color: white; border-radius: 15px; padding: 5px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #f5f5f5; color: #333;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item-left { display: flex; align-items: center; }
        .menu-item-left i { font-size: 18px; width: 30px; color: #3f51b5; }
        .menu-item-left span { font-size: 15px; font-weight: 500; }
        .menu-item-right { color: #ccc; font-size: 14px; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: white; display: flex; justify-content: space-around;
            padding: 10px 0; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); z-index: 100;
        }
        .nav-item { text-align: center; color: #888; text-decoration: none; flex-grow: 1; }
        .nav-item.active { color: #3f51b5; }
        .nav-item i { font-size: 20px; }
        .nav-item p { margin: 3px 0 0; font-size: 12px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title" style="margin-left: 15px;">আমার একাউন্ট</div>
    </header>

    <!-- Profile Card -->
    <div class="profile-card">
        <div class="profile-img-container">
            <img id="profilePic" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" alt="User Avatar">
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            <button class="edit-pic-btn" onclick="triggerImageUpload()"><i class="fas fa-camera"></i></button>
        </div>
        <div class="user-name" id="displayTitle">কাস্টমারের নাম</div>
        <div class="user-phone" id="displayPhone"><i class="fas fa-phone-alt"></i> মোবাইল নম্বর</div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>প্রোফাইল আপডেট করুন</h3>
            <input type="text" id="inputName" placeholder="আপনার পুরো নাম">
            <input type="text" id="inputPhone" placeholder="আপনার মোবাইল নম্বর">
            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="closeModal('editModal')">বাতিল</button>
                <button class="btn btn-save" onclick="saveProfile()">সেভ করুন</button>
            </div>
        </div>
    </div>

    <!-- Digital ID Card Modal (কাস্টমারদের জন্য) -->
    <div id="biodataModal" class="modal">
        <div class="modal-content">
            <h3>আপনার ডিজিটাল বায়োডাটা</h3>
            
            <div class="id-card">
                <img id="cardImage" src="" alt="Profile Image">
                <h4 id="cardName">নাম</h4>
                <p id="cardPhone">নম্বর</p>
                <div class="badge"><i class="fas fa-check-circle"></i> ভেরিফাইড কাস্টমার</div>
            </div>

            <div class="modal-buttons" style="justify-content: center; margin-top: 20px;">
                <button class="btn btn-save" style="width: 100%;" onclick="closeModal('biodataModal')">ঠিক আছে</button>
            </div>
        </div>
    </div>

    <!-- Menu List -->
    <div class="menu-container">
        <div class="menu-group">
            <div class="menu-item" onclick="openEditModal()">
                <div class="menu-item-left">
                    <i class="fas fa-user-edit"></i>
                    <span>প্রোফাইল সাজান</span>
                </div>
                <div class="menu-item-right"><i class="fas fa-chevron-right"></i></div>
            </div>
            
            <!-- কাস্টমার ফ্রেন্ডলি বায়োডাটা বাটন -->
            <div class="menu-item" onclick="showCustomerBiodata()">
                <div class="menu-item-left">
                    <i class="fas fa-id-card"></i>
                    <span>আমার ডিজিটাল কার্ড দেখুন</span>
                </div>
                <div class="menu-item-right"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>

        <div class="menu-group">
            <div class="menu-item" style="color: #ff5722;" onclick="clearProfileData()">
                <div class="menu-item-left">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>লগআউট করুন</span>
                </div>
                <div class="menu-item-right"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <footer class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i> <p>হোম</p></a>
        <a href="category.html" class="nav-item"><i class="fas fa-th-large"></i> <p>ক্যাটেগরি</p></a>
        <a href="#" class="nav-item"><i class="fas fa-shopping-bag"></i> <p>অর্ডার</p></a>
        <a href="#" class="nav-item active"><i class="fas fa-user"></i> <p>প্রোফাইল</p></a>
    </footer>

    <!-- JavaScript -->
    <script>
        const defaultImage = "20260602_122154.png"
        window.onload = function() {
            let savedName = localStorage.getItem('profileName');
            let savedPhone = localStorage.getItem('profilePhone');
            let savedImg = localStorage.getItem('profileImage');

            if (savedName) document.getElementById('displayTitle').innerText = savedName;
            if (savedPhone) document.getElementById('displayPhone').innerHTML = '<i class="fas fa-phone-alt"></i> ' + savedPhone;
            if (savedImg) {
                document.getElementById('profilePic').src = savedImg;
            } else {
                document.getElementById('profilePic').src = defaultImage;
            }
        };

        function openEditModal() {
            document.getElementById('editModal').style.display = 'flex';
            
            let currentName = document.getElementById('displayTitle').innerText;
            if(currentName !== "কাস্টমারের নাম") {
                document.getElementById('inputName').value = currentName;
            }
            
            let phoneText = document.getElementById('displayPhone').innerText;
            if(!phoneText.includes("মোবাইল নম্বর")) {
                document.getElementById('inputPhone').value = phoneText.replace(/[^\d+]/g, '');
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function saveProfile() {
            let newName = document.getElementById('inputName').value;
            let newPhone = document.getElementById('inputPhone').value;

            if(newName.trim() !== "") {
                document.getElementById('displayTitle').innerText = newName;
                localStorage.setItem('profileName', newName);
            }
            if(newPhone.trim() !== "") {
                document.getElementById('displayPhone').innerHTML = '<i class="fas fa-phone-alt"></i> ' + newPhone;
                localStorage.setItem('profilePhone', newPhone);
            }
            closeModal('editModal');
            alert('আপনার তথ্য সফলভাবে আপডেট হয়েছে!');
        }

        // কাস্টমারদের জন্য সুন্দর আইডি কার্ড দেখানোর ফাংশন
        function showCustomerBiodata() {
            let name = localStorage.getItem('profileName') || "কাস্টমারের নাম";
            let phone = localStorage.getItem('profilePhone') || "মোবাইল নম্বর দেওয়া হয়নি";
            let image = localStorage.getItem('profileImage') || defaultImage;

            document.getElementById('cardName').innerText = name;
            document.getElementById('cardPhone').innerText = phone;
            document.getElementById('cardImage').src = image;

            document.getElementById('biodataModal').style.display = 'flex';
        }

        function triggerImageUpload() {
            document.getElementById('imageInput').click();
        }

        function previewImage(event) {
            let reader = new FileReader();
            reader.onload = function(){
                let output = document.getElementById('profilePic');
                output.src = reader.result;
                localStorage.setItem('profileImage', reader.result);
                alert("আপনার প্রোফাইল ছবি সেভ হয়েছে!");
            }
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        function clearProfileData() {
            if(confirm("আপনি কি লগআউট করতে চান?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
